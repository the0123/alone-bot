[schedule]
# Day-of-week in cron uses APScheduler's convention: Mon=0, Sun=6
# (NOT standard cron's Sun=0, Sat=6)
weekday_pings = ["15 17 * * 0-4"]
weekend_pings = ["0 11 * * 5,6", "30 15 * * 5,6", "0 18 * * 5,6"]
followup_hours = 1.5
heartbeat = "0 9 * * *"

[behavior]
suggestions_per_session_max = 5
recent_repeat_blackout_days = 3
suggestion_timeout_hours = 12
session_window_minutes = 30

[database]
path = "/data/alone-bot.db"
